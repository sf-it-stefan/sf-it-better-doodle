name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/sf-it-stefan/sf-it-better-doodle

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-better-doodle
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host *\n  IdentityFile ~/.ssh/id_deploy\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Sync and deploy
        env:
          SSH_TARGET: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: /mnt/data/better-doodle
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          # Sync compose files to server (not the override — that's dev only)
          ssh $SSH_TARGET "mkdir -p $DEPLOY_PATH"
          rsync -avz docker-compose.yml docker-compose.prod.yml $SSH_TARGET:$DEPLOY_PATH/

          # Deploy on server
          ssh $SSH_TARGET bash << EOFSCRIPT
          cd $DEPLOY_PATH
          echo "$GHCR_PAT" | docker login ghcr.io -u sf-it-stefan --password-stdin 2>/dev/null
          DC="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
          \$DC pull app
          \$DC up -d

          # Wait for the app container to be running
          echo "Waiting for app container to be ready..."
          for i in \$(seq 1 30); do
            if \$DC exec -T app php artisan --version > /dev/null 2>&1; then
              echo "App container is ready."
              exit 0
            fi
            echo "  attempt \$i/30 — container not ready yet..."
            sleep 10
          done
          echo "ERROR: App container did not become ready within 5 minutes."
          \$DC logs app --tail=50
          exit 1
          EOFSCRIPT
