services:
  app:
    image: ghcr.io/sf-it-stefan/sf-it-better-doodle:latest
    # Production: no source bind-mount, no vendor volume — image contains everything
    volumes:
      - uploads-data:/var/www/html/storage/app/public/uploads
    environment:
      - VIRTUAL_HOST=better-doodle.sf-it.app
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=better-doodle.sf-it.app
      - LETSENCRYPT_EMAIL=admin@sf-it.at

networks:
  docker-nginx-proxy_default:
    name: proxy
    external: true
